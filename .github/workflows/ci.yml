name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  HUSKY: 0

jobs:
  # ─────────────────────────────────────────
  # 🔒 Security Audit
  # ─────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Audit root dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Audit backend dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: backend
        continue-on-error: true

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend
        continue-on-error: true

  # ─────────────────────────────────────────
  # 🧱 Smart Contract (Rust / Soroban)
  # ─────────────────────────────────────────
  contract:
    name: Smart Contract (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect contract changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
            BASE_COMMIT=$(git merge-base HEAD "origin/${{ github.base_ref }}" 2>/dev/null || echo "origin/${{ github.base_ref }}")
            CHANGED=$(git diff --name-only "$BASE_COMMIT"...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD^ HEAD)
            else
              CHANGED=$(git ls-tree -r --name-only HEAD)
            fi
          fi
          if echo "$CHANGED" | grep -qE '^(contracts/|Cargo\.(toml|lock)|scripts/test-contract\.sh)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust
        if: steps.changes.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: steps.changes.outputs.changed == 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Format check
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        if: steps.changes.outputs.changed == 'true'
        run: cargo build --workspace --all-targets

      - name: Run workspace tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --workspace --all-targets

      - name: Test with coverage
        if: steps.changes.outputs.changed == 'true'
        run: bash scripts/test-contract.sh --gas --coverage --ci
        env:
          ARTIFACTS_DIR: test-artifacts

      - name: Build WASM
        if: steps.changes.outputs.changed == 'true'
        run: bash scripts/test-contract.sh --build
        env:
          ARTIFACTS_DIR: test-artifacts

      - name: Upload coverage to Codecov
        if: steps.changes.outputs.changed == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: test-artifacts/escrow_contract-lcov.info,test-artifacts/insurance_contract-lcov.info
          flags: contracts
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: steps.changes.outputs.changed == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-artifacts-${{ github.sha }}
          path: test-artifacts/
          retention-days: 30

  # ─────────────────────────────────────────
  # ⚙️ Backend (Node.js)
  # ─────────────────────────────────────────
  backend:
    name: Backend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
            BASE_COMMIT=$(git merge-base HEAD "origin/${{ github.base_ref }}" 2>/dev/null || echo "origin/${{ github.base_ref }}")
            CHANGED=$(git diff --name-only "$BASE_COMMIT"...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD^ HEAD)
            else
              CHANGED=$(git ls-tree -r --name-only HEAD)
            fi
          fi
          if echo "$CHANGED" | grep -qE '^(backend/|package(-lock)?\.json)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node 20
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Generate Prisma Client
        if: steps.changes.outputs.changed == 'true'
        run: npm run db:generate -w backend

      - name: Test
        if: steps.changes.outputs.changed == 'true'
        run: npm test -w backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET: test-secret-for-ci-only
          STELLAR_NETWORK: testnet

  # ─────────────────────────────────────────
  # 🎨 Frontend (Next.js)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
            BASE_COMMIT=$(git merge-base HEAD "origin/${{ github.base_ref }}" 2>/dev/null || echo "origin/${{ github.base_ref }}")
            CHANGED=$(git diff --name-only "$BASE_COMMIT"...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD^ HEAD)
            else
              CHANGED=$(git ls-tree -r --name-only HEAD)
            fi
          fi
          if echo "$CHANGED" | grep -qE '^(frontend/|package(-lock)?\.json)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node 20
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build -w frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_CONTRACT_ADDRESS: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA

      - name: Unit Tests
        if: steps.changes.outputs.changed == 'true'
        run: npm run test:unit -w frontend

      - name: Integration Tests
        if: steps.changes.outputs.changed == 'true'
        run: npm run test:integration -w frontend
